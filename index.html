<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <title>MagicWebsite</title>

  <style>
    body {
      margin: 0;
      background-color: #1e1e1e;
      color: white;
      font-family: MuseoSans;
      text-align: center;
    }
    h1 {
      font-size: 70px;
      font-weight: 800;
    }
    .cardone {
      background: #2c2c2c;
      padding: 50px;
      margin: 50px auto;
      height: 300px;
      width: 500px;
      border-radius: 67px;
      border:3px solid cyan;
      transition: 0.3s;
      box-shadow:
        0 0 10px cyan,
        0 0 20px rgba(0,255,255,0.5);
    }
    .cardone:hover {
    transform: scale(1.05);
    transition: 0.3s;
    box-shadow:
      0 0 25px cyan;
    }

    img {
      width: 170px;
      height: 170px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid cyan;
      box-shadow:
        0 0 10px cyan,
        0 0 25px cyan,
        0 0 35px cyan,
        0 0 50px rgba(0,255,255,0.5);
      transition: 0.3s;
    }
  
    img:hover {
      transform: scale(1.2);
      box-shadow:
        0 0 20px cyan,
        0 0 30px cyan,
        0 0 40px cyan;
    }
    a {
      color: cyan;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
    .scroll-bar {
      position: fixed;
      right: 10px;
      top: 0;
      width: 5px;
      height: 100%;
      background: rgba(0,255,255,0.7);
   }

    .scroll-progress {
      width: 100%;
      height: 0%;
      background: cyan;
      box-shadow:
        0 0 10px cyan,
        0 0 20px cyan,
   }
    .btn {
      background-color: #2c2c2c;
      color: cyan;
      display: block;
      border: 2px solid cyan;
      padding: 20px 35px;
      font-size: 50px;
      font-weight: 670;
      border-radius: 20px;
      cursor: pointer;
      transition: 0.3s;
      margin: 20px auto;
   }  
    .btn:hover {
      background-color: cyan;
      color: black;
      box-shadow: 
        0 0 10px cyan,
        0 0 20px cyan,
        0 0 30px cyan;
      transform: scale(1.05);
    }
     .akira {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      translateY(-50px);
      translateX(-50px);
      opacity: 0;
      transition: opacity 0.5s, transform 0.5s;
      pointer-events: none;
      font-size: 40px;
      font-weight: 600;
      background-color: #2c2c2c;
      color: #FFFFFF;
      padding: 20px 30px;
      border: 2px solid cyan;
      border-radius: 15px;
      box-shadow: 0 0 15px cyan;
      width: 300px;
      margin: 20px auto;
      text-align: center; 
      z-index: 999;
    }

    .akira.show  {
      opacity: 1;
      transform: translate(-50%, -50%) translateY(0);
      pointer-events: auto;
    }
  }
  </style>
</head>

<body>
  <div class="scroll-bar">
  <div class="scroll-progress"></div>
  </div>
  
  <div class="cardone">
    <img src="https://cdn.phototourl.com/free/2026-03-28-d02dd4b7-909b-4802-98a3-9a7a5c64419c.png">
    <h1>MisicBox</h1>
  </div>
  
  <button class="btn" onclick="AkiraBox('box1')">Personal Data</button>
  <button class="btn" onclick="AkiraBox('box2')">Basic Info</button>
  
  <script>
     function AkiraBox(boxId) {
  const allBoxes = document.querySelectorAll('.akira');
  allBoxes.forEach(box => {
    if (box.id === boxId) {
      box.classList.toggle('show');
    } else {
      box.classList.remove('show');
    }
  });
}
  </script>
  
  <div id="box1" class="akira">
   你點開幹嘛
  </div>
  
  <div id="box2" class="akira">
    你好 你可以借我100塊嗎
  </div>

</body>
</html>
